name: Kitchen App CI/CD
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: api
      - name: Run lint
        run: npm run lint
        working-directory: api
      - name: Run tests
        run: npm test
        working-directory: api
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API Docker image
        run: docker build -t kitchen-api:local ./api --target production
      - name: Validate K8s manifests
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          mkdir -p $HOME/.kube
          cat <<'EOF' > $HOME/.kube/config
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://localhost:6443
              insecure-skip-tls-verify: true
            name: local
          contexts:
          - context:
              cluster: local
              user: local
            name: local
          current-context: local
          users:
          - name: local
            user: {}
          EOF
          kubectl apply --dry-run=client --validate=false -f k8s/namespace.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/web-ui/deployment.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/api/deployment.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/db/statefulset.yaml